spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supersave}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Supabase session pooler has a small client limit on free/shared environments.
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:600000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
