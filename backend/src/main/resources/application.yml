spring:
  application:
    name: supersave-backend
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  profiles:
    active: api

server:
  port: 8080

supersave:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  ai:
    gemini:
      enabled: ${SUPERSAVE_GEMINI_ENABLED:false}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      temperature: ${GEMINI_TEMPERATURE:0.3}
      max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:1024}
  public-data:
    enabled: true
    service-key: 7cdf90b6774ea6458bb691ccad45b86b02e680ad1a4d0dc804b3cc90b59b4dc9
    base-url: http://apis.data.go.kr/B552657/ErmctInfoInqireService
    num-of-rows: 1000
    refresh-interval-milliseconds: 120000
