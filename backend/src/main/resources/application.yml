spring:
  application:
    name: supersave-backend
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  profiles:
    active: postgres
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8080

supersave:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  ai:
    gemini:
      enabled: ${SUPERSAVE_GEMINI_ENABLED:false}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      temperature: ${GEMINI_TEMPERATURE:0.3}
      max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:1024}
  public-data:
    enabled: ${PUBLIC_DATA_ENABLED:true}
    service-key: ${PUBLIC_DATA_SERVICE_KEY:}
    base-url: ${PUBLIC_DATA_BASE_URL:http://apis.data.go.kr/B552657/ErmctInfoInqireService}
    num-of-rows: ${PUBLIC_DATA_NUM_OF_ROWS:1000}
    refresh-interval-milliseconds: ${PUBLIC_DATA_REFRESH_INTERVAL_MILLISECONDS:120000}
  kakao:
    local:
      rest-api-key: ${KAKAO_REST_API_KEY:}
      base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
    navigation:
      rest-api-key: ${KAKAO_NAVIGATION_REST_API_KEY:${KAKAO_REST_API_KEY:}}
      base-url: ${KAKAO_NAVIGATION_BASE_URL:https://apis-navi.kakaomobility.com}
