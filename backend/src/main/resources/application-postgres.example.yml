spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supersave}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
